<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" id="browserMockup" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 0;">
  <style>
    .browser-bg { fill: #1a1a1e; }
    .browser-header { fill: #25262e; }
    .circle-red { fill: #ff5f56; cursor: pointer; }
    .circle-yellow { fill: #ffbd2e; cursor: pointer; }
    .circle-green { fill: #27c93f; cursor: pointer; }
    .address-bar { fill: #0f1013; rx: 6px; }
    .address-text { font-family: system-ui, -apple-system, monospace; font-size: 14px; font-weight: 500; fill: #ffffff; }
    .mask-reference { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #636674; font-weight: bold; }
    .lock-icon { fill: #27c93f; }
  </style>

  <!-- Background stretched to full screen width/height -->
  <rect class="browser-bg" width="100%" height="100%" />

  <!-- Fixed Top Header bar (Width stretched to 100%) -->
  <rect class="browser-header" width="100%" height="65" />
  
  <circle class="circle-red" cx="35" cy="32" r="7" />
  <circle class="circle-yellow" cx="60" cy="32" r="7" />
  <circle class="circle-green" cx="85" cy="32" r="7" onclick="toggleFullscreen()" />
  
  <!-- Centered fluid Address Bar (Safe layout on boxes allows calc) -->
  <rect class="address-bar" x="160" y="15" width="calc(100% - 320px)" height="34" />
  <path class="lock-icon" d="M182,32 L182,29 C182,26.2 184.2,24 187,24 C189.8,24 192,26.2 192,29 L192,32 L195,32 L195,39 L179,39 L179,32 L182,32 Z M184,32 L190,32 L190,29 C190,27.3 188.7,26 187,26 C185.3,26 184,27.3 184,29 L184,32 Z" transform="translate(0, -2)" />
  <text class="address-text" x="205" y="36">https://xylora.org</text>
  
  <!-- FIX: Native anchor method ensures right alignment on all desktop/mobile monitors -->
  <text class="mask-reference" x="50%" y="36" text-anchor="end">SECURE GATEWAY via catclass.net</text>

  <!-- Fluid content viewport filling the remaining bottom space -->
  <foreignObject id="contentViewport" x="0" y="65" width="100%" height="calc(100% - 65px)">
    <xhtml:div xmlns:xhtml="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; margin: 0; padding: 0;">
      <xhtml:iframe 
        src="https://xylora.org/" 
        style="width: 100%; height: 100%; border: none; background: #ffffff;"
      />
    </xhtml:div>
  </foreignObject>

  <script type="text/javascript">
    <![CDATA[
    let isFullscreen = false;
    function toggleFullscreen() {
      const viewport = document.getElementById('contentViewport');
      
      if (!isFullscreen) {
        viewport.setAttribute('y', '0');
        viewport.setAttribute('height', '100%');
        isFullscreen = true;
      } else {
        viewport.setAttribute('y', '65');
        viewport.setAttribute('height', 'calc(100% - 65px)');
        isFullscreen = false;
      }
    }
    ]]>
  </script>
</svg>
