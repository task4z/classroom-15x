<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Learning Resources | Classroom15x</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f6f9fc; font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden; }
    
    /* Header e Navegação */
    header { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 0.8rem 1.5rem; 
        background: #fff; 
        border-bottom: 1px solid rgba(0,0,0,0.05); 
        position: sticky; 
        top: 0; 
        z-index: 100; 
        gap: 15px;
    }
    
    .logo { cursor: pointer; display: flex; align-items: center; flex-shrink: 0; }
    .logo img { height: 38px; width: auto; display: block; }

    /* --- Seção de Suporte no Header --- */
    .support-section {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f8f9fa;
        padding: 5px 12px;
        border-radius: 12px;
        border: 1px solid #eee;
    }

    .support-label {
        font-size: 11px;
        font-weight: 800;
        color: #adb5bd;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-right: 4px;
    }

    .social-links { display: flex; gap: 8px; align-items: center; }

    .social-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #eee;
        transition: all 0.2s ease;
        color: #333;
        text-decoration: none;
    }

    .social-icon:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .social-icon svg { width: 16px; height: 16px; fill: currentColor; }

    .bmc-link { display: flex; align-items: center; transition: transform 0.2s ease; }
    .bmc-link:hover { transform: scale(1.04); }
    .bmc-link img { height: 32px !important; width: auto; border-radius: 6px; }

    /* --- Widget Flutuante --- */
    .floating-widget {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: flex-end;
    }

    .support-bubble {
        background: #FFDD00;
        color: #000;
        padding: 12px 20px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        box-shadow: 0 10px 25px rgba(255, 221, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .support-bubble:hover { transform: scale(1.05) translateY(-5px); }
    .support-bubble svg { flex-shrink: 0; }

    /* Hero e Player */
    #hero-view { display: none; padding: 2rem 1.5rem 0rem 1.5rem; width: 100%; }
    .hero-layout { display: flex; gap: 1.5rem; max-width: 1900px; margin: 0 auto; justify-content: flex-start; }
    .player-group { display: flex; flex-direction: column; gap: 1.5rem; flex-shrink: 0; width: 1158px; max-width: 100%; }
    .player-row { display: flex; align-items: stretch; gap: 1.5rem; height: 527px; }
    
    .hero-ad-unit { background: #111; border-radius: 20px; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.2s; }
    .hero-ad-unit img { width: 100%; height: 100%; object-fit: cover; }
    .hero-ad-unit::after { content: "ADVERTISEMENT"; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    
    .side-bar-ad { width: 114px; flex-shrink: 0; }
    .player-container { flex-grow: 1; height:100%;width: 900px; background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; }
    #game-frame { width: 100%; height: 100%; border: none; }
    .bottom-mega-ad { width: 100%; height: 145px; }

    /* Listas e Cards */
    #sidebar-list { display: grid; grid-template-columns: repeat(5, 96px); grid-template-rows: repeat(6, 96px); gap: 1.5rem; list-style: none; align-content: start; flex-shrink: 0; }
    .launcher-container { padding: 2rem 1.5rem; }
    #resource-list { display: grid; grid-template-columns: repeat(auto-fill, 96px); grid-auto-rows: 96px; grid-auto-flow: dense; gap: 1.5rem; list-style: none; justify-content: center; }
    
    .resource-card { position: relative; width: 100%; height: 100%; background: #fff; border-radius: 20px; overflow: hidden; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
    li.size-4 { grid-column: span 2; grid-row: span 2; }
    .resource-card img { width: 100%; height: 100%; object-fit: cover; }
    
    .resource-name { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); color: #fff; font-size: 10px; padding: 5px; text-align: center; opacity: 0; pointer-events: none; transition: 0.3s; }
    .resource-card:hover .resource-name { opacity: 1; }

    li.is-ad .resource-card::after { content: "ADVERTISEMENT"; position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 6; }
    
    .fs-btn { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: none; color: white; padding: 10px; border-radius: 12px; cursor: pointer; z-index: 10; }
    
    .sidebar-open .is-duplicate { display: none !important; }

    /* Responsividade */
    @media (max-width: 1400px) { 
        .hero-layout { flex-direction: column; align-items: center; } 
        #sidebar-list { display: none; } 
        .player-group { width: 100%; } 
    }
    @media (max-width: 900px) {
        header { flex-wrap: wrap; height: auto; padding: 1rem; }
        .support-section { order: 2; width: 100%; justify-content: center; margin-top: 10px; }
        .support-label { display: none; }
    }
  </style>
</head>
<body class="library-view">

<section id="hero-view">
  <div class="hero-layout">
    <div class="player-group">
      <div class="player-row">
        <div class="hero-ad-unit side-bar-ad" onclick="window.open('https://classroom15x.net', '_blank')">
          <img src="images/ads.png" alt="Ad">
        </div>

        <div class="player-container" id="fs-target"></div>

        <div class="hero-ad-unit side-bar-ad" onclick="window.open('https://classroom15x.net', '_blank')">
          <img src="images/ads.png" alt="Ad">
        </div>
        </div>
      <div class="hero-ad-unit bottom-mega-ad" onclick="window.open('https://classroom15x.net', '_blank')">
        <img src="images/ads.png" alt="Ad">
      </div>
    </div>
    <ul id="sidebar-list"></ul>
  </div>
</section>

<div class="launcher-container">
  <ul id="resource-list"></ul>
</div>

<script>
  (function() {
    const JSON_URL = "learningresources.json";
    const AD_IMAGE = "images/ads.png";
    const AD_LINK = "https://classroom15x.net";
    
    const heroView = document.getElementById("hero-view");
    const fsTarget = document.getElementById("fs-target");
    const list = document.getElementById("resource-list");
    const sidebar = document.getElementById("sidebar-list");

    window.resetLibrary = function() {
      document.body.classList.remove("sidebar-open");
      heroView.style.display = "none";
      fsTarget.innerHTML = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function injectGameFrame(src) {
      fsTarget.innerHTML = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'player-container';

      const iframe = document.createElement('iframe');
      iframe.id = 'game-frame';
      iframe.src = 'about:blank';
      iframe.allowFullscreen = true;
      iframe.allow = 'autoplay; fullscreen; keyboard';
      wrapper.appendChild(iframe);

      const button = document.createElement('button');
      button.className = 'fs-btn';
      button.type = 'button';
      button.onclick = toggleFS;
      button.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';
      wrapper.appendChild(button);

      fsTarget.appendChild(wrapper);
      setTimeout(() => { iframe.src = src; }, 50);
    }

    function openCloakedResource(url) {
      const finalUrl = url.endsWith('/') ? url : url + '/';
      document.body.classList.add('sidebar-open');
      heroView.style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      injectGameFrame(finalUrl);
    }

    function toggleFS() {
      const target = document.querySelector('.player-container');
      if (!target) return;
      if (!document.fullscreenElement) target.requestFullscreen().catch(err => console.error(err));
      else document.exitFullscreen();
    }

    function createCard(name, b64Path, b64Img, isSize4, isAd = false, adType = "") {
      const li = document.createElement("li");
      if (isSize4) li.classList.add("size-4");
      if (isAd) li.classList.add("is-ad");
      if (adType) li.classList.add(adType);
  
      const card = document.createElement("div");
      card.className = "resource-card";
  
      card.onclick = () => {
          const path = isAd ? b64Path : atob(b64Path);
          if (isAd && adType === "ad-popup") {
            window.open(path, '_blank');
          } else {
            openCloakedResource(path);
          }
      };

      const image = document.createElement("img");
      image.src = isAd ? b64Img : atob(b64Img);
      image.onerror = function() { this.src = AD_IMAGE; };

      const overlay = document.createElement("div");
      overlay.className = "resource-name";
      overlay.textContent = name;

      card.appendChild(image);
      card.appendChild(overlay);
      li.appendChild(card);
      return li;
    }

    fetch(JSON_URL).then(r => r.json()).then(data => {
      const sidebarNames = new Set();

      // Add more sidebar ads at the top
      for (let s = 0; s < 6; s++) {
        const adSidebar = createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, false, true, "ad-sidebar");
        sidebar.appendChild(adSidebar);
      }

      data.forEach((entry, i) => {
        const name = (typeof entry === "string" ? entry : entry.name).trim();
        const b64Path = btoa(`resources/${name}`);
        const b64Img = btoa(`images/${name}.png`);

        // Add more sidebar resources, interleaved with ads
        if (i < 20) {
          sidebarNames.add(name);
          sidebar.appendChild(createCard(name, b64Path, b64Img, false));
          if (i % 5 === 4) {
            sidebar.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, false, true, "ad-sidebar"));
          }
        }

        // Insert more frequent ads in the grid
        if (i > 0 && i % 5 === 0) {
          // Big ad
          list.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, true, true, "ad-big"));
        }
        if (i > 0 && i % 3 === 0) {
          // Small ad
          list.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, false, true, "ad-small"));
        }

        // Randomly insert popup ad
        if (Math.random() < 0.07) {
          list.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, false, true, "ad-popup"));
        }

        const isSize4 = Math.random() < 0.15;
        const gridCard = createCard(name, b64Path, b64Img, isSize4);
        
        if (sidebarNames.has(name)) {
            gridCard.classList.add("is-duplicate");
        }

        list.appendChild(gridCard);
      });

      // Add a few more big ads at the end
      for (let b = 0; b < 4; b++) {
        list.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, true, true, "ad-big"));
      }
      // Add a few more small ads at the end
      for (let s = 0; s < 6; s++) {
        list.appendChild(createCard("ADVERTISEMENT", AD_LINK, AD_IMAGE, false, true, "ad-small"));
      }
    }).catch(err => console.error("Error loading resources:", err));
  })();
</script>
</body>
